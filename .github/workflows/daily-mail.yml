name: Daily Mail

on:
  schedule:
    - cron: '0 23 * * 0-4'        # KST 08:00 (월~금) — News Brief
    - cron: '10 23 * * 0-4'       # KST 08:10 (월~금) — CS Daily
    - cron: '20 23 * * 0-4'       # KST 08:20 (월~금) — Today Brief
  workflow_dispatch:
    inputs:
      module:
        description: 'Mail module to run (news-brief, cs-daily, today-brief, all)'
        required: false
        default: 'all'

concurrency:
  group: daily-mail
  cancel-in-progress: false

permissions:
  contents: write

env:
  CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
  GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
  GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
  MAIL_SENDER: ${{ secrets.MAIL_SENDER }}
  MAIL_RECIPIENT: ${{ secrets.MAIL_RECIPIENT }}
  DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
  DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }}
  DISCORD_CHANNEL_CS: ${{ secrets.DISCORD_CHANNEL_CS }}
  DISCORD_CHANNEL_NEWS: ${{ secrets.DISCORD_CHANNEL_NEWS }}
  GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
  GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
  GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}

jobs:
  send-mail:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Determine module
        id: module
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.module }}" >> $GITHUB_OUTPUT
          else
            CRON="${{ github.event.schedule }}"
            case "$CRON" in
              "0 23 * * 0-4")  echo "target=news-brief" >> $GITHUB_OUTPUT ;;
              "10 23 * * 0-4") echo "target=cs-daily" >> $GITHUB_OUTPUT ;;
              "20 23 * * 0-4") echo "target=today-brief" >> $GITHUB_OUTPUT ;;
              *)               echo "target=all" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Send mail
        run: ./gradlew bootRun --args="--mail.module=${{ steps.module.outputs.target }}"

      - name: Commit history
        run: |
          git config user.name "daily-mail-bot"
          git config user.email "bot@dailymail"
          git add data/history.json
          git diff --cached --quiet && exit 0
          git commit -m "[skip ci] ${{ steps.module.outputs.target }} $(date +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase -X theirs && git push && exit 0
            echo "Retry $i..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          echo "::warning::Failed to push history after 3 retries"

      - name: Notify failure to Discord
        if: failure()
        run: |
          curl -s -X POST "https://discord.com/api/v10/channels/$DISCORD_CHANNEL_ID/messages" \
            -H "Authorization: Bot $DISCORD_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"content\": \"**[Daily Mail 실패]** ${{ steps.module.outputs.target }} — ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
