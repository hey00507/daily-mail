<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 640px;
            margin: 0 auto;
            padding: 20px;
            color: #1a1a1a;
            background-color: #ffffff;
            line-height: 1.7;
        }
        .header {
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        .header h1 {
            font-size: 20px;
            margin: 0;
        }
        .header .meta {
            font-size: 13px;
            color: #666;
            margin-top: 4px;
        }
        .section {
            margin-bottom: 28px;
        }
        .section h2 {
            font-size: 17px;
            margin-bottom: 12px;
            color: #1a1a1a;
        }
        .news-item {
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .news-item:last-child {
            border-bottom: none;
        }
        .news-title {
            font-size: 15px;
            font-weight: 600;
        }
        .news-title a {
            color: #1a1a1a;
            text-decoration: none;
        }
        .news-title a:hover {
            text-decoration: underline;
        }
        .news-summary {
            font-size: 14px;
            color: #555;
            margin-top: 4px;
        }
        .news-source {
            font-size: 12px;
            color: #999;
            margin-top: 2px;
        }
        .footer {
            margin-top: 40px;
            padding-top: 12px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1 th:text="'News Brief — ' + ${date}">News Brief</h1>
        <div class="meta">Tech + 시사/경제 뉴스 요약</div>
    </div>

    <div class="section">
        <h2>Tech</h2>
        <div th:each="news : ${techNews}" class="news-item">
            <div class="news-title">
                <a th:href="${news.link}" th:text="${news.title}">제목</a>
            </div>
            <div class="news-summary" th:if="${!news.summary.isEmpty()}" th:text="${news.summary}">요약</div>
            <div class="news-source" th:text="${news.source}">출처</div>
        </div>
    </div>

    <div class="section">
        <h2>시사/경제</h2>
        <div th:each="news : ${generalNews}" class="news-item">
            <div class="news-title">
                <a th:href="${news.link}" th:text="${news.title}">제목</a>
            </div>
            <div class="news-summary" th:if="${!news.summary.isEmpty()}" th:text="${news.summary}">요약</div>
            <div class="news-source" th:text="${news.source}">출처</div>
        </div>
    </div>

    <div class="footer">
        Daily Mail — 게으른 개발자를 위한 모닝 브리핑
    </div>
</body>
</html>
