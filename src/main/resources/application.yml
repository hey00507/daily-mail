spring:
  application:
    name: daily-mail
  main:
    web-application-type: none
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_ADDRESS}
    password: ${GMAIL_APP_PASSWORD}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

mail:
  sender: ${MAIL_SENDER}
  recipient: ${MAIL_RECIPIENT}
  module: all                       # CLI arg로 오버라이드: --mail.module=news-brief
  modules:
    news-brief:
      enabled: true
      tags:
        - tech
        - 부동산
        - 경제
        - 정치
    cs-daily:
      enabled: true
    today-brief:
      enabled: true
      skip-if-empty: true           # 일정 없으면 메일 안 보냄

claude:
  api-key: ${CLAUDE_API_KEY}
  model: claude-haiku-4-5-20251001

discord:
  bot-token: ${DISCORD_BOT_TOKEN:}
  channel-id: ${DISCORD_CHANNEL_ID:}
  channels:
    cs-daily: ${DISCORD_CHANNEL_CS:}
    news-brief: ${DISCORD_CHANNEL_NEWS:}

google:
  calendar:
    client-id: ${GOOGLE_CLIENT_ID:}
    client-secret: ${GOOGLE_CLIENT_SECRET:}
    refresh-token: ${GOOGLE_REFRESH_TOKEN:}
